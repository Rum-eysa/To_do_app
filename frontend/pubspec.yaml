name: todo_app
description: A new Flutter project for Todo App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  easy_date_timeline: ^2.0.9
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  cupertino_icons: ^1.0.6
  get: ^4.6.6
  provider: ^6.1.1
  http: ^0.15.0
  shared_preferences: ^2.5.4
  intl: ^0.20.2
  flutter_dotenv: ^6.0.0
  flutter_local_notifications: ^18.0.1   # ← dev.2'den stabil versiyona düş
  flutter_timezone: ^2.1.0               # ← 5.0.1'den düş, String döndüren versiyon
  weekly_date_picker: ^1.1.0
  timezone: ^0.9.4     
  path_provider: ^2.1.1
  permission_handler: ^12.0.1
  android_alarm_manager_plus: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env

dependency_overrides:
  collection: 1.18.0  # Başına ^ koyma, tam olarak bu sürümü zorla
  http_parser: 4.0.0  # Sabit sürüm kullanarak uyuşmazlığı engelle
  intl: ^0.19.0
  http: ^1.1.0